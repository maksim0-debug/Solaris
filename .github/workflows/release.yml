name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    defaults:
      run:
        working-directory: solaris

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env file
        shell: bash
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          # Use printf to avoid issues with special characters in secrets
          printf "MAPBOX_TOKEN=%s\n" "$MAPBOX_TOKEN" > .env
          printf "GOOGLE_CLIENT_ID=%s\n" "$GOOGLE_CLIENT_ID" >> .env
          printf "GOOGLE_CLIENT_SECRET=%s\n" "$GOOGLE_CLIENT_SECRET" >> .env
          
      - name: Verify .env exists and has content
        shell: bash
        run: |
          if [ ! -s .env ]; then
            echo "Error: .env file is empty or missing! Check your GitHub Secrets."
            exit 1
          fi
          echo ".env file successfully created."

      - name: Generate obfuscated code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Release
        shell: pwsh
        run: |
          $buildDir = "build/windows/x64/runner/Release"
          $releaseDir = "Solaris_Release"
          if (Test-Path $releaseDir) { Remove-Item -Recurse -Force $releaseDir }
          New-Item -ItemType Directory -Path $releaseDir
          
          # Copy executable, dlls, and data folder
          Copy-Item "$buildDir/*.exe" -Destination $releaseDir/
          Copy-Item "$buildDir/*.dll" -Destination $releaseDir/
          Copy-Item -Path "$buildDir/data" -Destination "$releaseDir/data" -Recurse
          
          # Create archive in the root directory
          Compress-Archive -Path "$releaseDir/*" -DestinationPath ../Solaris-Windows.zip

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: Solaris-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
