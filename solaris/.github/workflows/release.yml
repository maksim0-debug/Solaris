name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.10.8' # Matching pubspec environment

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Release
        run: |
          mkdir release
          copy build\windows\runner\Release\solaris.exe release\Solaris.exe
          powershell Compress-Archive -Path release\* -DestinationPath Solaris-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: Solaris-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
